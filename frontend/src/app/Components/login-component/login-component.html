<div class="min-h-screen bg-background flex items-center justify-center px-4">

    <div
        class="w-full max-w-md rounded-xl bg-surface border border-border shadow-card p-8">

        <div class="mb-8 text-center">

            <h1 class="text-3xl font-bold text-text">
                Welcome Back
            </h1>

            <p class="mt-2 text-text-muted">
                Sign in to continue
            </p>

        </div>

        <form
            [formGroup]="form"
            (ngSubmit)="login()"
            class="space-y-5">

            <!-- Username -->

            <div>

                <label
                    class="mb-2 block text-sm font-medium text-text">

                    Username

                </label>

                <input
                    type="text"
                    formControlName="username"
                    placeholder="Enter username"
                    class="w-full rounded-md border border-border bg-surface px-4 py-3 text-text outline-none transition focus:border-primary focus:ring-2 focus:ring-ring" />

                @if(form.controls.username.touched &&
                form.controls.username.invalid){

                <p class="mt-1 text-sm text-danger">
                    Username is required.
                </p>

                }

            </div>

            <!-- Password -->

            <div>

                <label
                    class="mb-2 block text-sm font-medium text-text">

                    Password

                </label>

                <input
                    type="password"
                    formControlName="password"
                    placeholder="Enter password"
                    class="w-full rounded-md border border-border bg-surface px-4 py-3 text-text outline-none transition focus:border-primary focus:ring-2 focus:ring-ring" />

                @if(form.controls.password.touched &&
                form.controls.password.invalid){

                <p class="mt-1 text-sm text-danger">
                    Password is required.
                </p>

                }

            </div>

            @if(error()){

            <div
                class="rounded-md border border-danger/20 bg-danger/10 p-3 text-sm text-danger">

                {{ error() }}

            </div>

            }

            <button
                type="submit"
                [disabled]="loading()"
                class="w-full rounded-md bg-primary py-3 font-semibold text-text-inverse transition hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-60">

                @if(loading()){

                Signing in...

                }

                @else {

                Login

                }

            </button>

        </form>

    </div>

</div>
